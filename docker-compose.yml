version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: market-db
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_pass
      POSTGRES_DB: market_db
    ports:
      - "5432:5432"
    volumes:
      - market-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  market-db-data: